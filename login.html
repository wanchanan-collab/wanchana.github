<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTUREPATH AI - Login</title>
    <link rel="icon" href="img/logo1.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght=300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- 1. ตั้งค่าฟอนต์และตัวแปรหลัก --- */
        body { font-family: 'Kanit', sans-serif; }
        h1, h2, h3, h4, h5, h6, p { font-family: 'Kanit', sans-serif; }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #00f2fe;
            --secondary-color: #ff0080;
            --text-main: #ffffff;
            --ease-smooth: cubic-bezier(0.65, 0, 0.35, 1);
            --body-bg: #0f0c29; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* --- 2. พื้นหลังและโครงสร้างหลัก --- */
        body {
            background: var(--body-bg);
            background: linear-gradient(45deg, #0f0c29, #1a1a2e, #16213e);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* เอฟเฟกต์แสงเคลื่อนไหว (Blobs) */
        .blob {
            position: fixed; width: 600px; height: 600px; filter: blur(100px);
            border-radius: 50%; z-index: -1; opacity: 0.15;
            animation: move 25s infinite alternate ease-in-out;
        }
        .blob-1 { top: -150px; left: -150px; background: var(--accent-color); }
        .blob-2 { bottom: -150px; right: -150px; background: var(--secondary-color); animation-delay: -7s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(150px, 100px) scale(1.1); }
        }

        /* --- 3. ปุ่มเมนู (Hamburger Button) --- */
        .menu-btn {
            position: fixed; z-index: 1000; right: 30px; top: 30px;
            width: 60px; height: 60px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 50%;
            transition: all 0.6s var(--ease-smooth);
        }
        .menu-btn:hover { transform: scale(1.1) rotate(90deg); border-color: var(--accent-color); }

        .burger, .burger::before, .burger::after {
            width: 24px; height: 2px; background: #fff; border-radius: 2px; 
            transition: all 0.5s var(--ease-smooth); position: absolute;
        }
        .burger::before { content: ''; top: -8px; }
        .burger::after { content: ''; top: 8px; }

        .open .burger { transform: rotate(360deg); background: transparent; }
        .open .burger::before { transform: rotate(45deg); top: 0; }
        .open .burger::after { transform: rotate(-45deg); top: 0; }

        /* --- 4. เมนูนำทาง (Navigation Menu) --- */
        .glass-menu {
            position: fixed; inset: 0; background: rgba(10, 10, 25, 0.1);
            backdrop-filter: blur(40px) saturate(150%); display: flex; 
            justify-content: center; align-items: center; z-index: 900;
            clip-path: circle(0% at 93% 8%); 
            transition: clip-path 0.9s var(--ease-smooth);
        }
        .glass-menu.active { clip-path: circle(150% at 93% 8%); }

        .menu-nav { list-style: none; text-align: center; }
        .nav-item { margin: 35px 0; opacity: 0; transform: translateY(40px); transition: all 0.8s var(--ease-smooth); }
        .glass-menu.active .nav-item { opacity: 1; transform: translateY(0); }

        .nav-link {
            font-size: 1.5rem; color: rgba(255, 255, 255, 0.2); text-decoration: none; font-weight: 800; text-transform: uppercase;
            letter-spacing: 5px; transition: all 0.5s var(--ease-smooth);
        }
        .nav-link:hover { color: #fff; letter-spacing: 12px; text-shadow: 0 0 15px var(--accent-color); }

        body.menu-open { overflow: hidden; }

        /* --- 5. ฟอร์มล็อกอินและสมัครสมาชิก (Login / Signup Form) --- */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: all 0.5s var(--ease-smooth);
        }

        .login-card h2 {
            margin-bottom: 30px;
            font-size: 2.2rem;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: #fff;
            outline: none;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(135deg, var(--accent-color), #00a8ff);
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.4s;
            font-family: inherit;
        }

        .btn-submit:hover {
            box-shadow: 0 0 20px var(--accent-color);
            transform: translateY(-3px);
        }

        .toggle-text {
            margin-top: 25px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .toggle-text a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-text a:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="menu-btn" id="menu-btn"><div class="burger"></div></div>
    
    

    <main class="login-wrapper">
        
        <div class="login-card" id="form-card">
            <h2 id="form-title">เข้าสู่ระบบ</h2>
            <form id="auth-form">
                <div class="input-group" id="name-group" style="display: none;">
                    <label>ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" placeholder="กรอกชื่อของคุณ">
                </div>
                <div class="input-group">
                    <label>อีเมล</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                <div class="input-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit" id="submit-btn">ล็อคอิน</button>
                <div class="toggle-text">
                    <span id="toggle-msg">ยังไม่มีบัญชีใช่ไหม?</span> 
                    <a id="toggle-link" onclick="toggleForm()">สมัครสมาชิก</a>
                </div>
            </form>
        </div>

        <div class="login-card" id="profile-card" style="display: none; text-align: center;">
            <img id="user-avatar" src="" alt="Avatar" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent-color); margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);">
            <h2 id="welcome-name" style="margin-bottom: 10px;">ยินดีต้อนรับ</h2>
            <p id="welcome-email" style="color: rgba(255,255,255,0.7); margin-bottom: 30px;"></p>
            <button onclick="logout()" class="btn-submit">ออกจากระบบ</button>
        </div>

    </main>

    <script>
        // --- 1. สคริปต์ควบคุมเมนู ---
        const menuBtn = document.getElementById('menu-btn');
        const glassMenu = document.getElementById('glass-menu');
        menuBtn.onclick = () => { 
            menuBtn.classList.toggle('open'); 
            glassMenu.classList.toggle('active'); 
            document.body.classList.toggle('menu-open'); 
        };

        // --- 2. การสลับหน้าล็อกอิน / สมัครสมาชิก ---
        let isLogin = true;
        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
            document.getElementById('name-group').style.display = isLogin ? 'none' : 'block';
            document.getElementById('submit-btn').innerText = isLogin ? 'ล็อคอิน' : 'สร้างบัญชี';
            document.getElementById('toggle-msg').innerText = isLogin ? 'ยังไม่มีบัญชีใช่ไหม?' : 'มีบัญชีอยู่แล้ว?';
            document.getElementById('toggle-link').innerText = isLogin ? 'สมัครสมาชิก' : 'เข้าสู่ระบบ';
            
            document.getElementById('fullname').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        // --- 3. การจัดการเมื่อกดปุ่ม Submit เชื่อมต่อข้อมูลแบบอ่านค่าย้อนกลับ ---
        document.getElementById('auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');

            // 🔔 ตรวจสอบให้แน่ใจว่าได้ใช้ URL ล่าสุดที่คุณได้รับจากการ Deploy สคริปต์ในขั้นตอนที่ 1 ครับ
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqypnfiegVaYMK6sTYq8GBpnsoIQyDmLEh2H6k3KQXKsVG9zivQHGaNPiY1l3Cag5J4g/exec'; 

            submitBtn.innerText = 'กำลังตรวจสอบ...';
            submitBtn.disabled = true;

            const actionType = isLogin ? 'login' : 'register';
            const payload = { action: actionType, name: name, email: email, password: password };

            // ส่งข้อมูลโดยใช้สไตล์รับส่งข้อมูลแบบสตรีมผ่าน JSON-Stringify ไร้ CORS
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'cors', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (!response.ok) throw new Error('Network error');
                return response.json();
            })
            .then(data => {
                console.log(`ผลการทำรายการ [${actionType}]:`, data);
                
                if (data.status === "success") {
                    if (!isLogin) {
                        // เคสลงทะเบียนสำเร็จ
                        alert('✨ ลงทะเบียนสำเร็จแล้ว! ระบบได้จัดส่งข้อมูลเข้าฐานคลาวด์แล้ว กรุณาเข้าสู่ระบบด้วยบัญชีของคุณ');
                        toggleForm();
                    } else {
                        // เคสตรวจสอบล็อกอินสำเร็จ -> ทำการจำค่าลงเบราว์เซอร์ และเด้งหน้าไปที่ home.html ทันที
                        localStorage.setItem('futurepath_user_name', data.name);
                        localStorage.setItem('futurepath_user_email', email);
                        
                        alert('🔓 เข้าสู่ระบบสำเร็จ ยินดีต้อนรับเข้าสู่แพลตฟอร์ม FUTUREPATH AI');
                        
                        // 🚀 เด้งไปยังหน้าแรกหลักระบบ (home.html)
                        window.location.href = 'home.html'; 
                    }
                } else {
                    // เคสเมื่อฐานข้อมูลประมวลผลไม่สำเร็จ เช่น เมลซ้ำ หรือพาสเวิร์ดไม่ตรง
                    alert('🛑 ล้มเหลว: ' + data.message);
                }
                
                submitBtn.innerText = isLogin ? 'ล็อคอิน' : 'สร้างบัญชี';
                submitBtn.disabled = false;
            })
            .catch(error => {
                console.error('Error:', error);
                alert('❌ เกิดข้อผิดพลาดทางเทคนิคในการเข้าถึงฐานข้อมูลคลาวด์');
                submitBtn.innerText = isLogin ? 'ล็อคอิน' : 'สร้างบัญชี';
                submitBtn.disabled = false;
            });
        });

        function showProfile(userEmail, userName) {
            document.getElementById('form-card').style.display = 'none';
            document.getElementById('profile-card').style.display = 'block';
            
            document.getElementById('welcome-name').innerText = `ยินดีต้อนรับ, ${userName}`;
            document.getElementById('welcome-email').innerText = userEmail;

            let avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=00f2fe&color=000&size=150&bold=true`;
            document.getElementById('user-avatar').src = avatarUrl;
        }

        function logout() {
            document.getElementById('profile-card').style.display = 'none';
            document.getElementById('form-card').style.display = 'block';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
