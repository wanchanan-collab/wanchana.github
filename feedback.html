<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTUREPATH AI | Satisfaction Survey</title>
    <link rel="icon" href="img/logo1.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>


 /* --- แถบเลื่อน (Scrollbar) --- */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--body-bg); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-color), var(--secondary-color));
            border-radius: 10px;
            border: 2px solid var(--body-bg);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-color);
            box-shadow: 0 0 15px var(--secondary-color);
        }
               /* --- 1. ตัวแปรสีและสไตล์พื้นฐาน (CSS Variables) --- */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #00f2fe;    /* ฟ้านีออนหลัก */
            --secondary-color: #ff0080;  /* ชมพูนีออนรอง */
            --text-main: #ffffff;
            --ease-smooth: cubic-bezier(0.65, 0, 0.35, 1);
            --body-bg: #0f0c29; 
        }
          * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --glass-bg: rgba(20, 20, 35, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #00f2fe;
            --text-main: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(45deg, #0f0c29, #1a1a2e, #16213e); font-family: 'Kanit', sans-serif; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        .container { max-width: 800px; margin: 80px auto; padding: 20px; }
        .feedback-card { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .header-title { text-align: center; margin-bottom: 30px; }
        .evaluator-box { background: rgba(0, 242, 254, 0.05); border: 1px solid var(--accent-color); padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .evaluator-box img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent-color); }
        
        /* สไตล์สำหรับหมวดหมู่ */
        .category-title { margin-top: 30px; margin-bottom: 15px; color: var(--accent-color); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; font-size: 1.4rem; }
        
        .q-group { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .q-group h4 { font-weight: 400; margin-bottom: 10px; font-size: 1.1rem; }
        .rating-options { display: flex; justify-content: space-between; gap: 10px; }
        .rating-options label { flex: 1; text-align: center; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; cursor: pointer; border: 1px solid var(--glass-border); transition: all 0.2s ease; }
        .rating-options input { display: none; }
        .rating-options span { font-size: 1.1rem; color: rgba(255,255,255,0.6); }
        
        .rating-options label:has(input:checked) { border-color: var(--accent-color); background: rgba(0, 242, 254, 0.15); box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        .rating-options input:checked + span { color: var(--accent-color); font-weight: 600; }
        
        textarea { width: 100%; height: 100px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; color: #fff; margin-top: 10px; resize: none; font-family: 'Kanit', sans-serif; }
        textarea:focus { outline: none; border-color: var(--accent-color); }
        .btn-submit { width: 100%; padding: 15px; margin-top: 30px; background: linear-gradient(90deg, var(--accent-color), #0072ff); border: none; border-radius: 50px; font-weight: bold; color: #000; font-size: 1.1rem; cursor: pointer; transition: opacity 0.2s; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <main class="container">
        <div class="feedback-card">
            <div class="header-title">
                <h1>แบบประเมินความพึงพอใจ</h1>
                <p>ความคิดเห็นของคุณช่วยให้เราพัฒนา FUTUREPATH AI</p>
            </div>

            <div id="evaluator-display" class="evaluator-box">
                <img id="evaluator-avatar" src="" alt="Avatar">
                <div>
                    <p style="font-size: 0.8rem; opacity: 0.7;">ผู้ประเมิน:</p>
                    <b id="evaluator-name" style="color: var(--accent-color);">กำลังโหลด...</b>
                </div>
            </div>

            <form id="feedback-form">
                <div id="survey-container"></div>
                
                <h3 style="margin-top:30px;">ข้อเสนอแนะเพิ่มเติม</h3>
                <textarea id="comment" placeholder="พิมพ์ข้อเสนอแนะของคุณที่นี่..."></textarea>
                
                <button type="submit" class="btn-submit" id="btn-submit">ส่งแบบประเมิน</button>
            </form>
        </div>
    </main>

    <script>
        const sessionName = localStorage.getItem('futurepath_user_name') || "ผู้ใช้ทั่วไป";
        const sessionEmail = localStorage.getItem('futurepath_user_email') || "-";

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('evaluator-name').innerText = sessionName;
            document.getElementById('evaluator-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(sessionName)}&background=00f2fe&color=000&size=100&bold=true`;
            renderSurvey();
        });

        // โครงสร้างข้อมูลแบบแบ่งหมวดหมู่และนับข้อย่อ
        const surveyData = [
            {
                category: "หมวดที่ 1: การออกแบบและการใช้งาน (UI/UX)",
                items: [
                    { id: "1_1", text: "ดีไซน์การออกแบบสวยงามและทันสมัย" },
                    { id: "1_2", text: "การจัดวางเมนูและหน้าต่างใช้งานง่าย ไม่ซับซ้อน" },
                    { id: "1_3", text: "การแสดงผลบนสมาร์ตโฟนและแท็บเล็ตใช้งานได้ดี" },
                    { id: "1_4", text: "การใช้กราฟหรือแผนผังแสดงข้อมูลดูเข้าใจง่าย" },
                    { id: "1_5", text: "ความยากง่ายในการทำแบบทดสอบหรือการกรอกข้อมูล" }
                ]
            },
            {
                category: "หมวดที่ 2: ประสิทธิภาพและความเสถียรของระบบ",
                items: [
                    { id: "2_1", text: "ความเสถียรของระบบโดยรวม ไม่มีอาการค้าง" },
                    { id: "2_2", text: "ความเร็วในการโหลดข้อมูลและการประมวลผล" },
                    { id: "2_3", text: "ระบบจดจำสถานะสมาชิกและบันทึกข้อมูลได้แม่นยำ" },
                    { id: "2_4", text: "ความปลอดภัยของการล็อกอินและข้อมูลส่วนตัว" },
                    { id: "2_5", text: "การเข้าถึงลิงก์หรือเนื้อหาภายนอกทำได้อย่างถูกต้อง" }
                ]
            },
            {
                category: "หมวดที่ 3: คุณภาพของ AI และเนื้อหา",
                items: [
                    { id: "3_1", text: "ความแม่นยำและการวิเคราะห์ผลของระบบ AI" },
                    { id: "3_2", text: "แชทบอทให้คำปรึกษาและข้อมูลที่เป็นประโยชน์" },
                    { id: "3_3", text: "ข้อมูลเส้นทางอาชีพและแนวโน้มมีความชัดเจน" },
                    { id: "3_4", text: "คำแนะนำการพัฒนาทักษะ (Skill) ตรงกับความต้องการ" },
                    { id: "3_5", text: "ระบบช่วยให้คุณเห็นแนวทางพัฒนาตนเองได้จริง" }
                ]
            },
            {
                category: "หมวดที่ 4: ความพึงพอใจโดยรวม",
                items: [
                    { id: "4_1", text: "ระบบการค้นหาข้อมูลอาชีพมีประสิทธิภาพ" },
                    { id: "4_2", text: "ระบบประเมินคะแนนทักษะมีรูปแบบที่เหมาะสม" },
                    { id: "4_3", text: "ฟังก์ชันการทำงานมีความหลากหลายและตอบโจทย์" },
                    { id: "4_4", text: "ความพึงพอใจในภาพรวมต่อแพลตฟอร์ม" },
                    { id: "4_5", text: "คุณจะแนะนำระบบนี้ให้แก่เพื่อนหรือคนรู้จักใช้งานต่อ" }
                ]
            }
        ];

        // ฟังก์ชันสร้างคำถาม
        function renderSurvey() {
            const container = document.getElementById('survey-container');
            let htmlContent = "";

            surveyData.forEach(cat => {
                htmlContent += `<h2 class="category-title">${cat.category}</h2>`;
                cat.items.forEach(item => {
                    const displayId = item.id.replace('_', '.'); 
                    htmlContent += `
                    <div class="q-group">
                        <h4>${displayId} ${item.text}</h4>
                        <div class="rating-options">
                            ${[1,2,3,4,5].map(n => `
                                <label>
                                    <input type="radio" name="q${item.id}" value="${n}" required>
                                    <span>${n}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>`;
                });
            });
            container.innerHTML = htmlContent;
        }

        document.getElementById('feedback-form').onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = 'กำลังบันทึกข้อมูล...';

            const payload = {
                action: "feedback",
                name: sessionName,
                email: sessionEmail,
                comment: document.getElementById('comment').value.trim()
            };

            // ดึงข้อมูลคำตอบ
            surveyData.forEach(cat => {
                cat.items.forEach(item => {
                    const selected = document.querySelector(`input[name="q${item.id}"]:checked`);
                    payload[`q${item.id}`] = selected ? selected.value : "";
                });
            });

            // ส่งข้อมูลไปยัง Apps Script (อย่าลืมตรวจสอบว่า URL ตรงกับที่คุณ Deploy)
            fetch('https://script.google.com/macros/s/AKfycbxFcPBEtvQlnPs51nwASaSkKsAWQkmgO-mLJfii3tTevoZPB_WTp4HNpE7CAbf-hwTbnQ/exec', {
                method: 'POST', 
                body: JSON.stringify(payload)
            })
            .then(response => response.json()) // รับค่าการแปลงข้อมูลกลับมาจาก Apps script
            .then(data => {
                if (data.status === "success") {
                    alert("ขอบคุณสำหรับความคิดเห็นและการประเมินระบบครับ!");
                    window.location.href = "home.html"; // หรือหน้าไหนก็ได้ที่คุณต้องการ
                } else {
                    // หาก Apps Script ส่งกลับมาว่า error จะแสดงข้อความแจ้งเตือนทันที
                    alert("บันทึกไม่สำเร็จ สาเหตุ: " + data.message);
                    btn.disabled = false;
                    btn.innerHTML = 'ส่งแบบประเมิน';
                }
            })
            .catch((err) => {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์ กรุณาลองใหม่อีกครั้ง");
                console.error("Fetch Error:", err);
                btn.disabled = false;
                btn.innerHTML = 'ส่งแบบประเมิน';
            });
        };
    </script>
</body>
</html>
