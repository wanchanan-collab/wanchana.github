<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTUREPATH AI | Q&A Chatbot</title>
    <link rel="icon" href="img/logo1.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- แถบเลื่อน (Scrollbar) --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.5);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        /* --- 1. Variables & Base Styles --- */
        :root {
            --glass-bg: rgba(20, 20, 35, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #00f2fe;
            --secondary-color: #ff0080;
            --text-main: #ffffff;
            --ease-smooth: cubic-bezier(0.65, 0, 0.35, 1);
            --body-bg: #0f0c29; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--body-bg);
            font-family: 'Kanit', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden; 
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, h6, p { font-family: 'Kanit', sans-serif; }

        /* --- 2. วิดีโอพื้นหลังแบบกลืนกับสีเว็บ --- */
        .video-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3; overflow: hidden;
            background: var(--body-bg);
        }
        .video-container video {
            min-width: 100%; min-height: 100%; width: auto; height: auto;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); object-fit: cover;
            opacity: 0.25; mix-blend-mode: screen;
        }
        .video-overlay {
            position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(15, 12, 41, 0.2) 0%, rgba(15, 12, 41, 0.95) 100%);
            z-index: -2;
        }

        /* --- 3. ก้อนแสงนีออน (Blobs) --- */
        .blob {
            position: fixed; width: 500px; height: 500px; filter: blur(120px);
            border-radius: 50%; z-index: -1; opacity: 0.2;
            animation: move 20s infinite alternate ease-in-out;
        }
        .blob-1 { top: -100px; left: -100px; background: var(--accent-color); }
        .blob-2 { bottom: -100px; right: -100px; background: var(--secondary-color); animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 80px) scale(1.1); }
        }

        /* --- 4. Hamburger Menu --- */
        .menu-btn {
            position: fixed; z-index: 1000; right: 30px; top: 30px;
            width: 50px; height: 50px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 50%;
            transition: all 0.6s var(--ease-smooth);
        }
        .menu-btn:hover { transform: scale(1.1) rotate(90deg); border-color: var(--accent-color); }

        .burger, .burger::before, .burger::after {
            width: 20px; height: 2px; background: #fff; border-radius: 2px; 
            transition: all 0.5s var(--ease-smooth); position: absolute;
        }
        .burger::before { content: ''; top: -6px; }
        .burger::after { content: ''; top: 6px; }

        .open .burger { transform: rotate(360deg); background: transparent; }
        .open .burger::before { transform: rotate(45deg); top: 0; }
        .open .burger::after { transform: rotate(-45deg); top: 0; }

        .glass-menu {
            position: fixed; inset: 0; background: rgba(10, 10, 25, 0.8);
            backdrop-filter: blur(40px) saturate(150%); display: flex; 
            justify-content: center; align-items: center; z-index: 900;
            clip-path: circle(0% at 93% 8%); 
            transition: clip-path 0.9s var(--ease-smooth);
        }
        .glass-menu.active { clip-path: circle(150% at 93% 8%); }

        .menu-nav { list-style: none; text-align: center; }
        .nav-item { margin: 25px 0; opacity: 0; transform: translateY(40px); transition: all 0.8s var(--ease-smooth); }
        .glass-menu.active .nav-item { opacity: 1; transform: translateY(0); }

        .nav-link {
            font-size: 1.5rem; color: rgba(255, 255, 255, 0.4); text-decoration: none; font-weight: 800; text-transform: uppercase;
            letter-spacing: 5px; transition: all 0.5s var(--ease-smooth);
        }
        .nav-link:hover { color: #fff; letter-spacing: 12px; text-shadow: 0 0 15px var(--accent-color); }

        /* --- 5. Chat Interface Styles --- */
        .chat-wrapper {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 20px auto;
            height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding-right: 100px; 
        }

        .user-profile { display: flex; align-items: center; gap: 15px; }
        .user-profile img {
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .btn-logout {
            background: transparent; border: 1px solid var(--secondary-color); color: var(--secondary-color);
            padding: 8px 20px; border-radius: 50px;
            font-weight: 600; cursor: pointer; transition: 0.3s; font-family: inherit;
        }
        .btn-logout:hover { background: var(--secondary-color); color: #fff; box-shadow: 0 0 15px var(--secondary-color); }

        .chat-history {
            flex-grow: 1; padding: 30px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* 🚀 โครงสร้างกล่องข้อความที่มีชื่อและเวลา */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.4s var(--ease-smooth);
        }
        .message-wrapper.ai { align-self: flex-start; }
        .message-wrapper.user { align-self: flex-end; }

        .message-meta {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 5px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .message-wrapper.ai .message-meta { justify-content: flex-start; }
        .message-wrapper.user .message-meta { justify-content: flex-end; }
        
        .message-meta .name { font-weight: 600; }
        .message-wrapper.ai .message-meta .name { color: var(--accent-color); }
        .message-wrapper.user .message-meta .name { color: #ffffff; }

        .message {
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.ai {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top-left-radius: 5px;
        }
        .message.user {
            background: rgba(0, 242, 254, 0.15);
            border: 1px solid var(--accent-color);
            border-top-right-radius: 5px;
            color: #fff;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.1);
        }

        .chat-input-area {
            padding: 20px 30px; border-top: 1px solid var(--glass-border);
            display: flex; gap: 15px; background: rgba(0, 0, 0, 0.3);
        }
        .chat-input-area input {
            flex-grow: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            border-radius: 50px; padding: 15px 25px; color: #fff; font-size: 1rem; outline: none; transition: 0.3s; font-family: inherit;
        }
        .chat-input-area input:focus { border-color: var(--accent-color); background: rgba(255,255,255,0.1); }

        .btn-send {
            background: linear-gradient(135deg, var(--accent-color), #00a8ff); border: none; border-radius: 50%;
            width: 55px; height: 55px; display: flex; justify-content: center; align-items: center;
            color: #000; font-size: 1.2rem; cursor: pointer; transition: 0.3s;
        }
        .btn-send:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--accent-color); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typing Indicator */
        .typing-indicator { display: flex; gap: 5px; padding: 5px 10px; }
        .dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; opacity: 0.4; animation: blink 1.4s infinite both; }
        .dot:nth-child(1) { animation-delay: 0.2s; }
        .dot:nth-child(2) { animation-delay: 0.4s; }
        .dot:nth-child(3) { animation-delay: 0.6s; }
        @keyframes blink { 0% { opacity: 0.2; transform: scale(0.8); } 20% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.2; transform: scale(0.8); } }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="vdo/vdobg2.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="menu-btn" id="menu-btn"><div class="burger"></div></div>

       <ul class="menu-nav">
            <li><img src="img/logo1.png" width="80px" alt="Logo" style="margin-bottom:15px;" onerror="this.style.display='none'"></li>
            <h1> FUTUREPATH AI</h1>
            <li class="nav-item" style="transition-delay: 0.2s;"><a href="home.html" class="nav-link">หน้าหลัก</a></li>
            <li class="nav-item" style="transition-delay: 0.4s;"><a href="assessment.html" class="nav-link">วิเคราะห์ศักยภาพและแนะแนวอาชีพ</a></li>
            <li class="nav-item" style="transition-delay: 0.6s;"><a href="chat.html" class="nav-link">AI-ChatBot</a></li>
            <li class="nav-item" style="transition-delay: 0.8s;"><a href="interview.html" class="nav-link">ระบบจำลองการสัมภาษณ์ด้วยเสียง</a></li>
            <li class="nav-item" style="transition-delay: 1.0s;"><a href="simulation.html" class="nav-link">ทดลองทำงานจริงในสายงานที่คุณใฝ่ฝัน</a></li>
            <li class="nav-item" style="transition-delay: 1.02s;"><a href="feedback.html" class="nav-link">แบบประเมินความพึงพอใจ</a></li>
        </ul>
    
    </nav>
    </nav>

    <div class="chat-wrapper">
        <div class="chat-header">
            <div class="user-profile">
                <img id="user-avatar" src="img/logo1.png" alt="Avatar">
                <div>
                    <span style="font-size: 0.8rem; opacity: 0.6; display: block; line-height: 1;">ระบบให้คำปรึกษา AI</span>
                    <b id="user-name" style="color: var(--accent-color); font-size: 1.1rem;">กำลังตรวจสอบสิทธิ์...</b>
                </div>
            </div>
            <button class="btn-logout" onclick="triggerLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
            </button>
        </div>

        <div class="chat-history" id="chat-history"></div>

        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="พิมพ์คำถามหรือปรึกษาเรื่องการศึกษาที่นี่..." autocomplete="off">
            <button class="btn-send" id="btn-send" onclick="handleSend()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        /* =========================================
           1. ระบบควบคุมการเปิดปิดเมนูแฮมเบอร์เกอร์
        ========================================= */
        const menuBtn = document.getElementById('menu-btn');
        const glassMenu = document.getElementById('glass-menu');

        menuBtn.onclick = () => {
            menuBtn.classList.toggle('open');
            glassMenu.classList.toggle('active');
        };

        document.querySelectorAll('.nav-link').forEach(link => {
            link.onclick = () => {
                menuBtn.classList.remove('open');
                glassMenu.classList.remove('active');
            }
        });

        /* =========================================
           2. ระบบตรวจสอบสิทธิ์และออกจากระบบ
        ========================================= */
        const sessionName = localStorage.getItem('futurepath_user_name');

        if (!sessionName) {
            alert("🛑 กรุณาเข้าสู่ระบบก่อนเข้าใช้งานระบบปรึกษา AI");
            window.location.href = 'login.html'; 
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('user-name').innerText = sessionName;
            document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(sessionName)}&background=00f2fe&color=000&size=100&bold=true`;
            setTimeout(aiGreeting, 500);
        });

        function triggerLogout() {
            if (confirm("คุณต้องการออกจากระบบห้องแชท FUTUREPATH AI ใช่หรือไม่?")) {
                localStorage.removeItem('futurepath_user_name');
                localStorage.removeItem('futurepath_user_email');
                window.location.href = 'index.html'; 
            }
        }

        /* =========================================
           3. ระบบเชื่อมต่อสมองกล AI (Gemini API)
        ========================================= */
        const API_KEYS = [
            "AIzaSyCEvLNRGyWHWfZv8sTTs7VktQXKCozb8ak", 
            "AIzaSyBKOnb3mMWMSDcSyLnT6cC8_-87OFalzGo" 
        ];
        
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent";
        let currentKeyIndex = 0;
        let conversationHistory = [];

        function getActiveKey() { return API_KEYS[currentKeyIndex]; }
        function rotateKey() {
            if (currentKeyIndex < API_KEYS.length - 1) { currentKeyIndex++; return true; }
            return false;
        }

        const chatHistoryDiv = document.getElementById('chat-history');
        const chatInput = document.getElementById('chat-input');
        const btnSend = document.getElementById('btn-send');

        chatInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                handleSend();
            }
        });

        // 🚀 อัปเดต: ฟังก์ชันสร้างกล่องข้อความแบบมีชื่อและเวลา
        function appendMessage(sender, text) {
            const wrapper = document.createElement('div');
            wrapper.classList.add('message-wrapper', sender);

            // คำนวณเวลาปัจจุบัน (ชม:นาที)
            const now = new Date();
            const timeString = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            
            // กำหนดชื่อที่แสดงผล
            const displayName = sender === 'ai' ? 'FUTUREPATH AI' : sessionName;

            // สร้างส่วนแสดงชื่อและเวลา
            const metaHTML = `
                <div class="message-meta">
                    <span class="name">${displayName}</span>
                    <span class="time">${timeString} น.</span>
                </div>
            `;

            // สร้างกล่องข้อความ
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            
            if(sender === 'ai') {
                msgDiv.innerHTML = `<i class="fa-solid fa-robot" style="color:var(--accent-color); margin-right:8px;"></i> ${text}`;
            } else {
                msgDiv.innerText = text;
            }

            wrapper.innerHTML = metaHTML;
            wrapper.appendChild(msgDiv);

            chatHistoryDiv.appendChild(wrapper);
            chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;
        }

        // 🚀 อัปเดต: แสดงจุดไข่ปลาระหว่างรอ โดยมีชื่อกำกับไว้ด้วย
        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.classList.add('message-wrapper', 'ai');
            wrapper.setAttribute('id', 'typing-indicator');

            const now = new Date();
            const timeString = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

            wrapper.innerHTML = `
                <div class="message-meta">
                    <span class="name">FUTUREPATH AI</span>
                    <span class="time">${timeString} น.</span>
                </div>
                <div class="message ai">
                    <div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>
            `;
            chatHistoryDiv.appendChild(wrapper);
            chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingDiv = document.getElementById('typing-indicator');
            if(typingDiv) typingDiv.remove();
        }

        function aiGreeting() {
            const greetingMsg = "สวัสดี มีอะไรให้ช่วย หรือปรึกษา ครับ";
            appendMessage('ai', greetingMsg);
            
            conversationHistory.push({
                role: "user",
                parts: [{ text: `คุณคือ FUTUREPATH AI ผู้เชี่ยวชาญด้านการให้คำปรึกษาเกี่ยวกับการศึกษา การเรียนต่อ และการค้นหาอาชีพ ตอบคำถามเป็นภาษาไทยด้วยความสุภาพ เป็นกันเอง ผู้ใช้งานชื่อ: ${sessionName}` }]
            });
            conversationHistory.push({
                role: "model",
                parts: [{ text: greetingMsg }]
            });
        }

        async function handleSend() {
            const userText = chatInput.value.trim();
            if (!userText) return;

            appendMessage('user', userText);
            chatInput.value = '';
            btnSend.disabled = true;

            conversationHistory.push({ role: "user", parts: [{ text: userText }] });

            showTypingIndicator();

            let aiResponseText = "ขออภัยครับ ระบบ AI เกิดข้อขัดข้องชั่วคราว กรุณาลองใหม่อีกครั้ง";
            
            while (currentKeyIndex < API_KEYS.length) {
                try {
                    const response = await fetch(`${API_URL}?key=${getActiveKey()}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: conversationHistory
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        console.error("API Error Response:", errData);
                        throw new Error(`API Error: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    if (data.candidates && data.candidates.length > 0) {
                        aiResponseText = data.candidates[0].content.parts[0].text;
                    }
                    break; 
                } catch (e) {
                    if (!rotateKey()) {
                        console.error("โควตา API หมดทุกคีย์แล้ว หรือการเชื่อมต่อล้มเหลว", e);
                        break;
                    }
                }
            }

            removeTypingIndicator();
            
            // แปลงสัญลักษณ์ตัวหนาของ Markdown
            const formattedResponse = aiResponseText.replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--accent-color);">$1</b>').replace(/\n/g, '<br>');
            appendMessage('ai', formattedResponse);
            
            conversationHistory.push({ role: "model", parts: [{ text: aiResponseText }] });
            
            btnSend.disabled = false;
            chatInput.focus();
        }
    </script>
</body>
