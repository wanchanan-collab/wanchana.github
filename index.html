<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTUREPATH AI | Home</title>
    <link rel="icon" href="img/logo1.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>


 /* --- แถบเลื่อน (Scrollbar) --- */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--body-bg); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-color), var(--secondary-color));
            border-radius: 10px;
            border: 2px solid var(--body-bg);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-color);
            box-shadow: 0 0 15px var(--secondary-color);
        }
        
        /* --- 1. Base Styles & Variables --- */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #00f2fe;
            --secondary-color: #ff0080;
            --text-color: #ffffff;
            --ease-smooth: cubic-bezier(0.65, 0, 0.35, 1);
            --body-bg: #0f0c29;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            min-height: 100vh;
            font-family: 'Kanit', sans-serif;
            /* สีพื้นหลังหลัก (จะทะลุวิดีโอขึ้นมา) */
            background: var(--body-bg);
            background: linear-gradient(45deg, #0f0c29, #1a1a2e, #16213e);
            color: var(--text-color);
            overflow: hidden; 
        }

        h1, h2, h3, h4, h5, h6, p { font-family: 'Kanit', sans-serif; }

        /* --- 2. วิดีโอพื้นหลังแบบกลืนกับสีเว็บ (Blended Video) --- */
        .video-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; /* ให้อยู่หลังสุด */
            overflow: hidden;
            background: transparent;
        }

        .video-container video {
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            display: block;
            
            /* --- หัวใจหลักของการทำให้วิดีโอกลืนกับสีพื้นหลัง --- */
            opacity: 0.20; /* ทำให้วิดีโอจางลง 35% */
            mix-blend-mode: screen; /* ผสมแสงของวิดีโอกับสีเว็บให้ดูเรืองแสง */
        }

        .video-overlay {
            position: absolute; inset: 0;
            /* ไล่สีดำทับขอบหน้าจอ ทำให้ขอบมืดและตรงกลางสว่าง */
            background: radial-gradient(circle, rgba(15, 12, 41, 0.1) 0%, rgba(15, 12, 41, 0.95) 100%);
            z-index: -2;
        }

        /* --- 3. พื้นหลังก้อนแสงนีออน (Blobs) --- */
        .blob {
            position: fixed; width: 600px; height: 600px; filter: blur(100px);
            border-radius: 50%; z-index: -1; opacity: 0.2; /* อยู่เหนือวิดีโอ แต่หลังเนื้อหา */
            animation: move 25s infinite alternate ease-in-out;
        }
        .blob-1 { top: -150px; left: -150px; background: var(--accent-color); }
        .blob-2 { bottom: -150px; right: -150px; background: var(--secondary-color); animation-delay: -7s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(150px, 100px) scale(1.1); }
        }

        /* --- 4. Hamburger Menu --- */
        .menu-btn {
            position: fixed; z-index: 1000; right: 30px; top: 30px;
            width: 60px; height: 60px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 50%;
            transition: all 0.6s var(--ease-smooth);
        }
        .menu-btn:hover { transform: scale(1.1) rotate(90deg); border-color: var(--accent-color); }

        .burger, .burger::before, .burger::after {
            width: 24px; height: 2px; background: #fff; border-radius: 2px; 
            transition: all 0.5s var(--ease-smooth); position: absolute;
        }
        .burger::before { content: ''; top: -8px; }
        .burger::after { content: ''; top: 8px; }

        .open .burger { transform: rotate(360deg); background: transparent; }
        .open .burger::before { transform: rotate(45deg); top: 0; }
        .open .burger::after { transform: rotate(-45deg); top: 0; }

        .glass-menu {
            position: fixed; inset: 0; background: rgba(10, 10, 25, 0.2);
            backdrop-filter: blur(40px) saturate(150%); display: flex; 
            justify-content: center; align-items: center; z-index: 900;
            clip-path: circle(0% at 93% 8%); 
            transition: clip-path 0.9s var(--ease-smooth);
            visibility: hidden;
        }
        .glass-menu.active { clip-path: circle(150% at 93% 8%); visibility: visible; }

        .menu-nav { list-style: none; text-align: center; }
        .nav-item { margin: 35px 0; opacity: 0; transform: translateY(40px); transition: all 0.8s var(--ease-smooth); }
        .glass-menu.active .nav-item { opacity: 1; transform: translateY(0); }

        .nav-link {
            font-size: 1.5rem; color: rgba(255, 255, 255, 0.2); text-decoration: none; font-weight: 800; text-transform: uppercase;
            letter-spacing: 5px; transition: all 0.5s var(--ease-smooth);
        }
        .nav-link:hover { color: #fff; letter-spacing: 12px; text-shadow: 0 0 15px var(--accent-color); }

        /* --- 5. Main Content --- */
        .home-content {
            position: relative; z-index: 1;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            text-align: center; padding: 0 20px;
        }

        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 60px 50px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 650px;
            animation: fadeInScale 1.2s var(--ease-smooth);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 800;
            margin-bottom: 20px; letter-spacing: 2px;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        p {
            font-size: 1.1rem; opacity: 0.9; margin-bottom: 40px;
            font-weight: 300; line-height: 1.8; color: #e0e0e0;
        }

        .btn-enter {
            display: inline-block; 
            padding: 15px 45px;
            font-size: 1.1rem; font-weight: 700;
            text-decoration: none; color: #000;
            background: linear-gradient(135deg, var(--accent-color), #00a8ff);
            border-radius: 50px;
            transition: 0.4s; 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            border: none; cursor: pointer;
        }

        .btn-enter:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 25px var(--accent-color); 
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>
     


    <div class="video-container">
        <video id="bgVideo" autoplay muted loop playsinline preload="auto">
            <source src="vdo/vdobg2.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

   
    




    <div class="home-content">
        <div class="glass-box">
            <h1>FUTUREPATH AI</h1>
            <p>ระบบ AI วิเคราะห์ศักยภาพและแนะแนวอาชีพแห่งอนาคต</p>
            
            <a href="login.html" class="btn-enter">ลงชื่อเข้าใช้</a>
        </div>
    </div>

    <script>
        // ควบคุมเมนูแฮมเบอร์เกอร์
        const menuBtn = document.getElementById('menu-btn');
        const glassMenu = document.getElementById('glass-menu');

        menuBtn.onclick = () => {
            menuBtn.classList.toggle('open');
            glassMenu.classList.toggle('active');
        };

        // ควบคุมวิดีโอ (ป้องกัน Browser บล็อก)
        window.addEventListener('DOMContentLoaded', (event) => {
            const video = document.getElementById('bgVideo');
            const playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("วิดีโอถูกบล็อก: " + error);
                });
            }
        });

        // ปิดเมนูอัตโนมัติเมื่อคลิกลิงก์
        document.querySelectorAll('.nav-link').forEach(link => {
            link.onclick = () => {
                menuBtn.classList.remove('open');
                glassMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
