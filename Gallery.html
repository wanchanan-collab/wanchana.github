<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Hub | Hamburger Edition</title>

    <style>
        /* --- 1. Variables & Base Styles --- */
        :root {
            --accent-color: #00f2fe;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --ease-smooth: cubic-bezier(0.65, 0, 0.35, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            font-family: 'Segoe UI', Roboto, 'Kanit', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- 2. Full Screen Video Background --- */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .video-bg video {
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.4) blur(2px);
        }

        /* --- 3. Hamburger Menu (แบบเดิมที่ต้องการ) --- */
        .menu-btn {
            position: fixed; z-index: 1000; right: 30px; top: 30px;
            width: 65px; height: 65px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 50%;
            transition: 0.6s var(--ease-smooth);
        }
        .menu-btn:hover { transform: scale(1.1); border-color: var(--accent-color); }

        .burger, .burger::before, .burger::after {
            width: 26px; height: 2px; background: #fff; border-radius: 2px; 
            transition: 0.5s var(--ease-smooth); position: absolute;
        }
        .burger::before { content: ''; top: -9px; }
        .burger::after { content: ''; top: 9px; }
        
        /* สลับเป็นรูปกากบาทตอนเปิด */
        .open .burger { background: transparent; }
        .open .burger::before { transform: rotate(45deg); top: 0; }
        .open .burger::after { transform: rotate(-45deg); top: 0; }

        .glass-menu {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(40px); display: flex; 
            justify-content: center; align-items: center; z-index: 900;
            clip-path: circle(0% at 93% 8%); /* ขยายจากมุมขวาบน */
            transition: 0.9s var(--ease-smooth);
        }
        .glass-menu.active { clip-path: circle(150% at 93% 8%); }

        .nav-links { list-style: none; text-align: center; }
        .nav-links li { margin: 30px 0; opacity: 0; transform: translateY(30px); transition: 0.5s; }
        .active li { opacity: 1; transform: translateY(0); transition-delay: 0.4s; }

        .nav-links a {
            font-size: 2.5rem; color: rgba(255,255,255,0.3); text-decoration: none; 
            font-weight: 800; text-transform: uppercase; letter-spacing: 5px; transition: 0.4s;
        }
        .nav-links a:hover { color: #fff; letter-spacing: 12px; text-shadow: 0 0 15px var(--accent-color); }

        /* --- 4. Content Area --- */
        .main-content {
            position: relative; z-index: 1;
            padding: 100px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-title {
            text-align: center; margin-bottom: 50px;
            animation: fadeInDown 1s var(--ease-smooth);
        }
        .header-title h1 {
            font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--accent-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 4px;
        }

        /* Album Tabs */
        .filter-nav {
            margin-bottom: 40px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
        }
        .month-btn {
            padding: 12px 35px; background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 50px; color: #fff;
            cursor: pointer; transition: 0.4s; font-weight: bold; font-size: 0.9rem;
        }
        .month-btn.active { 
            background: var(--accent-color); color: #000; 
            box-shadow: 0 0 25px var(--accent-color); border-color: var(--accent-color); 
        }

        /* Gallery Grid */
        .gallery-grid {
            width: 100%; max-width: 1200px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; padding: 10px;
        }
        .gallery-card {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 25px;
            overflow: hidden; aspect-ratio: 1/1; cursor: pointer;
            transition: 0.5s var(--ease-smooth); animation: scaleIn 0.6s var(--ease-smooth) forwards;
        }
        .gallery-card:hover { transform: scale(1.05) translateY(-10px); border-color: var(--accent-color); }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }

        /* --- 5. Lightbox --- */
        .lightbox {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); z-index: 2000; justify-content: center; align-items: center;
        }
        .lightbox-content { max-width: 85%; max-height: 80vh; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        body.menu-open { overflow: hidden; }

    </style>
</head>
<body>

    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-connection-loop-2426-large.mp4" type="video/mp4">
        </video>
    </div>

    <div class="menu-btn" id="menu-btn">
        <div class="burger"></div>
    </div>

    <nav class="glass-menu" id="glass-menu">
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="Gallery.html">Gallery</a></li>
            <li><a href="#">Work</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <header class="header-title">
            <h1>Gallery</h1>
            <p style="opacity: 0.5; letter-spacing: 3px; font-weight: 300;">THE ART OF VISUAL JOURNEY</p>
        </header>

        <nav class="filter-nav">
            <button class="month-btn active" data-month="jan">มกราคม</button>
            <button class="month-btn" data-month="mar">มีนาคม</button>
            <button class="month-btn" data-month="apr">เมษายน</button>
        </nav>

        <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <div id="lightbox" class="lightbox">
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
        // Gallery Data
        const galleryData = {
            jan: [
                { url: "https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=800" },
                { url: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800" },
                { url: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800" }
            ],
            mar: [
                { url: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800" },
                { url: "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=800" }
            ],
            apr: [
                { url: "https://images.unsplash.com/photo-1500624239112-c3d057535171?w=800" },
                { url: "https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800" },
                { url: "https://images.unsplash.com/photo-1433086566207-c58a8348ee7c?w=800" }
            ]
        };

        // Menu Logic
        const menuBtn = document.getElementById('menu-btn');
        const glassMenu = document.getElementById('glass-menu');
        
        menuBtn.onclick = () => {
            menuBtn.classList.toggle('open');
            glassMenu.classList.toggle('active');
            document.body.classList.toggle('menu-open');
        };

        // Gallery Filtering Logic
        const grid = document.getElementById('gallery-grid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function renderGallery(month) {
            grid.innerHTML = '';
            galleryData[month].forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `<img src="${item.url}" alt="Memories">`;
                
                card.onclick = () => {
                    lightboxImg.src = item.url;
                    lightbox.style.display = 'flex';
                };
                
                grid.appendChild(card);
            });
        }

        // Filter buttons click
        document.querySelectorAll('.month-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.month-btn.active').classList.remove('active');
                btn.classList.add('active');
                renderGallery(btn.dataset.month);
            };
        });

        // Close Lightbox
        lightbox.onclick = () => {
            lightbox.style.display = 'none';
        };

        // Initial Load
        renderGallery('jan');
    </script>
</body>
</html>
